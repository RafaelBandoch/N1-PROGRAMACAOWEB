<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Veículo</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body class="bg-white min-h-screen">
    <div class="max-w-md mx-auto px-4 py-16">
      <div class="mb-10">
        <a href="index.html" class="text-sm text-gray-600 hover:text-gray-900"
          >Voltar</a
        >
        <h1 class="text-2xl font-normal text-gray-900 mt-10 mb-1">
          Novo Veículo
        </h1>
        <p class="text-sm text-gray-500">Registre um novo veículo</p>
      </div>

      <div id="alert" class="mb-6 p-4 rounded text-sm hidden"></div>

      <form id="form" class="space-y-5">
        <div>
          <label class="block text-sm font-normal text-gray-700 mb-2"
            >Placa</label
          >
          <input
            type="text"
            name="placa"
            placeholder="ABC1234"
            required
            class="w-full px-3 py-2 border border-gray-200 rounded bg-white text-sm focus:outline-none focus:border-gray-400"
          />
        </div>

        <div>
          <label class="block text-sm font-normal text-gray-700 mb-2"
            >Capacidade (kg)</label
          >
          <input
            type="number"
            name="capacidade"
            required
            class="w-full px-3 py-2 border border-gray-200 rounded bg-white text-sm focus:outline-none focus:border-gray-400"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 bg-gray-900 text-white text-sm font-normal rounded hover:bg-gray-800 transition mt-8"
        >
          Cadastrar
        </button>
      </form>
    </div>

    <script>
      const form = document.querySelector("#form");
      const alert = document.querySelector("#alert");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const placa = form.querySelector('[name="placa"]').value;
        const capacidade = Number(
          form.querySelector('[name="capacidade"]').value,
        );

        try {
          const res = await fetch("/api/veiculos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ placa, capacidade }),
          });
          const data = await res.json();

          if (res.ok) {
            alert.textContent = "✓ " + data.mensagem;
            alert.className =
              "mb-6 p-4 rounded text-sm bg-green-50 text-green-700";
            form.reset();
          } else {
            alert.textContent = "✗ " + data.erro;
            alert.className = "mb-6 p-4 rounded text-sm bg-red-50 text-red-700";
          }
        } catch (e) {
          alert.textContent = "✗ Erro ao conectar";
          alert.className = "mb-6 p-4 rounded text-sm bg-red-50 text-red-700";
        }
      });
    </script>
  </body>
</html>

<div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm transition-opacity duration-300 opacity-0 flex items-center justify-center z-50 p-4">
  <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-md p-8 shadow-2xl transform scale-95 opacity-0 transition-all duration-300 max-h-[90vh] overflow-y-auto w-full">
    <div class="flex justify-between items-center mb-8">
      <h2 id="modal-titulo" class="text-2xl font-bold text-white">Cadastrar Motorista</h2>
      <button id="btn-fechar-modal" class="text-zinc-500 hover:text-white p-2">✕</button>
    </div>

    <div id="modal-alerta" class="mb-6"></div>
    <form id="modal-form" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-zinc-500 uppercase ml-1 mb-1">Nome</label>
        <input type="text" name="nome" class="w-full bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/20 focus:border-zinc-500 transition-all" required />
      </div>

      <div>
        <label class="block text-xs font-bold text-zinc-500 uppercase ml-1 mb-1">Status</label>
        <select name="status" class="w-full bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/20 transition-all" required>
          <option value="ATIVO" class="bg-zinc-900">ATIVO</option>
          <option value="INATIVO" class="bg-zinc-900">INATIVO</option>
        </select>
      </div>

      <div class="flex gap-3 pt-6">
        <button type="submit" id="btn-salvar-modal" class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-zinc-200 transition-colors">Salvar</button>
        <button type="button" id="btn-cancelar-modal" class="flex-1 bg-zinc-800 text-white font-bold py-3 rounded-xl hover:bg-zinc-700 transition-colors">Cancelar</button>
      </div>
    </form>
  </div>
</div>

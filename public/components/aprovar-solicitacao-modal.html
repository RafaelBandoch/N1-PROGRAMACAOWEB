<div class="p-6">
  <div class="mb-6">
    <h2 class="text-xl font-bold text-white">Aprovar Solicitação</h2>
    <p class="text-sm text-zinc-400 mt-1">Preencha os dados operacionais necessários para converter esta solicitação em uma tarefa oficial.</p>
  </div>

  <form id="modal-form" class="space-y-4">
    <input type="hidden" name="solicitacao_id" id="aprovar-solicitacao-id">

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Caçamba Disponível</label>
      <select name="cacamba_id" required class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none select-cacambas text-sm">
        <option value="" disabled selected>Carregando caçambas...</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Motorista</label>
      <select name="motorista_id" required class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none select-motoristas text-sm">
        <option value="" disabled selected>Carregando motoristas...</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Veículo</label>
      <select name="veiculo_id" required class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2.5 text-white focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition outline-none select-veiculos text-sm">
        <option value="" disabled selected>Carregando veículos...</option>
      </select>
    </div>

    <div id="modal-alerta" class="pt-2"></div>

    <div class="flex gap-3 pt-4 border-t border-zinc-800 mt-6">
      <button type="button" id="btn-cancelar-modal" class="flex-1 py-2.5 px-4 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white font-medium transition text-sm">Cancelar</button>
      <button type="submit" class="flex-1 py-2.5 px-4 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-white font-bold transition text-sm flex items-center justify-center">Aprovar e Criar Tarefa</button>
    </div>
  </form>
</div>

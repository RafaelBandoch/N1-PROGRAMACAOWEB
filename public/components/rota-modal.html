<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded max-w-md w-full max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <h2 class="text-lg font-normal text-gray-900">Cadastrar Rota</h2>
      <button id="btn-fechar-modal" class="text-gray-400 hover:text-gray-600 text-xl leading-none">
        ✕
      </button>
    </div>

    <div class="p-6">
      <div id="modal-alerta"></div>
      <form id="modal-form">
        <div class="mb-4">
          <label class="block text-sm font-normal text-gray-900 mb-1">Data</label>
          <input
            type="date"
            name="data"
            class="w-full px-3 py-2 rounded text-sm border border-gray-200 focus:outline-none focus:ring-1 focus:ring-gray-900"
            required
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-normal text-gray-900 mb-1">ID do Motorista</label>
          <input
            type="number"
            name="motorista_id"
            class="w-full px-3 py-2 rounded text-sm border border-gray-200 focus:outline-none focus:ring-1 focus:ring-gray-900"
            required
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-normal text-gray-900 mb-1">Status</label>
          <select
            name="status"
            class="w-full px-3 py-2 rounded text-sm border border-gray-200 focus:outline-none focus:ring-1 focus:ring-gray-900"
            required
          >
            <option value="PLANEJADA">PLANEJADA</option>
            <option value="EM_EXECUCAO">EM_EXECUCAO</option>
            <option value="FINALIZADA">FINALIZADA</option>
          </select>
        </div>

        <div class="flex gap-3 mt-6">
          <button
            type="submit"
            class="flex-1 px-4 py-2 rounded text-sm font-normal bg-gray-900 text-white hover:bg-gray-800 transition"
          >
            Salvar
          </button>
          <button
            type="button"
            id="btn-cancelar-modal"
            class="flex-1 px-4 py-2 rounded text-sm font-normal bg-gray-100 text-gray-700 hover:bg-gray-200 transition"
          >
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

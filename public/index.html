<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Caçambas - Dashboard</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body class="relative min-h-screen font-sans bg-slate-50">
    <!-- Background Gradient Blob -->
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-indigo-50 via-white to-purple-50"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      
      <!-- Premium Header -->
      <header class="mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center bg-white/60 backdrop-blur-xl p-8 rounded-[2rem] shadow-sm border border-white/80">
        <div>
          <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-600 mb-3 tracking-tight">
            Gestão Integrada
          </h1>
          <p class="text-slate-500 font-medium text-lg">Painel de controle e monitoramento de caçambas</p>
        </div>
        <div class="mt-6 md:mt-0 flex gap-4">
          <a href="pages/gestao.html" class="px-6 py-3 rounded-2xl text-sm font-semibold bg-white text-indigo-600 border border-indigo-100 shadow-[0_4px_20px_-4px_rgba(99,102,241,0.2)] hover:shadow-[0_8px_25px_-5px_rgba(99,102,241,0.3)] hover:bg-slate-50 transition-all duration-300 transform hover:-translate-y-1">
            Modo Foco (Detalhado)
          </a>
        </div>
      </header>

      <!-- Grid wrapper -->
      <div class="grid grid-cols-1 lg:grid-cols-2 lg:gap-8 gap-6">

        <!-- Template for Sections -->
        <!-- We will generate these using JS to keep the file clean, but for immediate rendering we could hardcode. Hardcoding is better for pure Tailwind experience -->

        <!-- SECTIONS GENERATED BY JS -->
        <div id="dashboard-grid" class="contents"></div>

      </div>
    </div>

    <!-- Templates -->
    <template id="section-template">
      <section class="glass p-7 rounded-[2rem] hover:shadow-2xl hover:shadow-indigo-500/10 transition-all duration-300 transform group border border-white/60">
        <div class="flex justify-between items-center mb-6">
          <div class="flex items-center gap-4">
            <div class="p-3.5 bg-gradient-to-br from-indigo-100 to-violet-100 rounded-2xl text-indigo-600 shadow-inner group-hover:scale-110 transition-transform duration-300">
              <svg class="w-6 h-6 section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 tracking-tight section-title"></h2>
          </div>
          <button
            class="btn-cadastrar px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-900 text-white shadow-lg shadow-slate-900/20 hover:bg-indigo-600 hover:shadow-indigo-600/30 hover:-translate-y-0.5 transition-all duration-300"
          >
            + Cadastrar Novo
          </button>
        </div>
        <div class="lista-container bg-white/50 rounded-2xl p-4 overflow-x-auto text-sm no-scrollbar border border-white/40 min-h-[140px]">
          <div class="animate-pulse flex space-x-4 items-center h-full justify-center loading-state">
            <div class="text-slate-400 font-medium tracking-wide">Carregando dados...</div>
          </div>
        </div>
      </section>
    </template>

    <template id="table-template">
      <table class="w-full text-left whitespace-nowrap">
        <thead>
          <tr class="table-header-row"></tr>
        </thead>
        <tbody class="divide-y divide-slate-100/60 table-body"></tbody>
      </table>
    </template>

    <template id="empty-state-template">
      <div class="flex h-full items-center justify-center py-6 text-slate-400 font-medium">Nenhum registro encontrado</div>
    </template>

    <template id="error-state-template">
      <div class="flex items-center justify-center p-4 text-red-500 font-medium text-sm bg-red-50 rounded-xl">Erro ao carregar dados.</div>
    </template>

    <!-- Container para modais -->
    <div id="modal-container"></div>

    <script src="js/index.js"></script>
  </body>
</html>

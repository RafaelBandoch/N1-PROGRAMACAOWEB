<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestão de Caçambas</title>

<link rel="stylesheet" href="css/output.css">

<style>
span.inline-flex{
color:inherit !important;
}
</style>

</head>


<body class="bg-black text-zinc-200 min-h-screen font-sans">

<div class="max-w-7xl mx-auto px-6 py-10">


<header class="mb-10 flex flex-col md:flex-row justify-between items-center bg-zinc-900 border border-zinc-800 p-8 rounded-3xl">

<div>

<h1 class="text-4xl font-bold text-white mb-2">
Gestão Integrada
</h1>

<p class="text-zinc-400">
Painel de controle e monitoramento de caçambas
</p>

</div>


<div class="mt-6 md:mt-0">

<a href="pages/gestao.html"
class="px-6 py-3 rounded-xl text-sm font-semibold bg-black border border-zinc-700 text-white hover:bg-zinc-800 transition">

Modo Foco (Detalhado)

</a>

</div>

</header>



<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<div id="dashboard-grid" class="contents"></div>

</div>

</div>



<template id="section-template">

<section class="bg-zinc-900 border border-zinc-800 p-7 rounded-3xl hover:border-zinc-700 transition">

<div class="flex justify-between items-center mb-6">

<div class="flex items-center gap-4">

<div class="p-3 bg-zinc-800 rounded-xl text-zinc-300">

<svg class="w-6 h-6 section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>

</div>

<h2 class="text-xl font-bold text-white section-title"></h2>

</div>


<button
class="btn-cadastrar px-4 py-2 text-sm font-semibold rounded-lg bg-black border border-zinc-700 text-white hover:bg-zinc-800 transition">

+ Cadastrar

</button>

</div>



<div class="lista-container bg-zinc-900 rounded-xl p-4 overflow-x-auto text-sm border border-zinc-800 min-h-[140px]">

<div class="loading-state text-zinc-400 text-center py-6">
Carregando dados...
</div>

</div>

</section>

</template>



<template id="table-template">

<table class="w-full text-left text-sm">

<thead class="text-xs uppercase text-zinc-400 border-b border-zinc-800">

<tr class="table-header-row"></tr>

</thead>

<tbody class="table-body divide-y divide-zinc-800"></tbody>

</table>

</template>



<template id="empty-state-template">

<div class="flex justify-center py-6 text-zinc-500">

Nenhum registro encontrado

</div>

</template>



<template id="error-state-template">

<div class="text-red-400 text-sm text-center py-6">

Erro ao carregar dados

</div>

</template>



<div id="modal-container"></div>

<script src="js/index.js"></script>

</body>
</html>

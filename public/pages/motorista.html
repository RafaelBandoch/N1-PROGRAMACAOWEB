<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Motorista | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Outfit', sans-serif; }
  </style>

  <script>
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');

    if (!token || !userStr) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userStr);
      if (user.role !== 'motorista' && user.role !== 'admin') {
        window.location.href = 'login.html';
      }
    }
  </script>
</head>

<body class="bg-zinc-950 text-zinc-300 min-h-screen relative overflow-x-hidden selection:bg-blue-500 selection:text-white">

  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] opacity-10 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 blur-[120px] rounded-full mix-blend-screen"></div>
  </div>

  <nav class="fixed w-full z-50 bg-zinc-950/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-blue-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-white">Painel<span class="text-blue-500">Motorista</span></span>
      </div>

      <button onclick="logout()" class="text-zinc-400 hover:text-white transition-colors">
        Sair
      </button>
    </div>
  </nav>

  <main class="pt-32 pb-24 px-6 relative z-10 max-w-7xl mx-auto">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-4xl font-bold text-white">Painel do Motorista</h1>
        <p class="text-zinc-500 mt-2">Acompanhe suas rotas e organize suas tarefas.</p>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-2 mb-8 shadow-2xl">
      <div class="flex flex-wrap gap-2">
        <button id="btnRotas" onclick="trocarAba('rotas')" class="tipo-btn flex-1 px-4 py-3 rounded-xl bg-zinc-800 text-white font-semibold">
          Rotas
        </button>

        <button id="btnTarefas" onclick="trocarAba('tarefas')" class="tipo-btn flex-1 px-4 py-3 rounded-xl text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50 font-semibold">
          Tarefas / Kanban
        </button>
      </div>
    </div>

    <section class="bg-zinc-900/80 border border-zinc-800 rounded-3xl p-6 shadow-xl">
      <div class="flex justify-between items-center mb-6">
        <h2 id="tituloPainel" class="text-2xl font-bold text-white">Minhas Rotas</h2>
      </div>

      <div id="conteudoPainel" class="min-h-[400px]">
        <div class="text-zinc-500 py-12 text-center animate-pulse">Carregando...</div>
      </div>
    </section>

  </main>

  <script>
    const STATUS_COLORS = {
      PLANEJADA: "bg-zinc-800 text-blue-400 ring-blue-500/30",
      EM_EXECUCAO: "bg-zinc-800 text-cyan-400 ring-cyan-500/30",
      FINALIZADA: "bg-zinc-800 text-teal-400 ring-teal-500/30",
      EM_ANDAMENTO: "bg-zinc-800 text-blue-400 ring-blue-500/30",
      ENTREGUE: "bg-zinc-800 text-orange-400 ring-orange-500/30",
      COLETADO: "bg-zinc-800 text-red-400 ring-red-500/30",
      CANCELADO: "bg-zinc-800 text-zinc-400 ring-zinc-500/30",
      JUSTIFICADO: "bg-zinc-800 text-purple-400 ring-purple-500/30"
    };

    let abaAtual = 'rotas';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function limparEnderecoParaMaps(endereco) {
      if (!endereco) return '';

      let enderecoLimpo = endereco;

      enderecoLimpo = enderecoLimpo
        .replace(/\s*-\s*Ref:.*$/i, '')
        .replace(/\s*\|\s*Ref:.*$/i, '')
        .replace(/\s*Referência:.*$/i, '')
        .replace(/\s*Referencia:.*$/i, '')
        .replace(/\s*-\s*Referência:.*$/i, '')
        .replace(/\s*-\s*Referencia:.*$/i, '');

      enderecoLimpo = enderecoLimpo.replace(
        /(,\s*\d+)\s*-\s*[^,]+(,)/i,
        '$1$2'
      );

      enderecoLimpo = enderecoLimpo
        .replace(/\s+/g, ' ')
        .replace(/\s+,/g, ',')
        .replace(/,\s+/g, ', ')
        .trim();

      if (!/Joinville/i.test(enderecoLimpo)) {
        enderecoLimpo += ', Joinville, SC';
      }

      return enderecoLimpo;
    }

    function trocarAba(aba) {
      abaAtual = aba;

      const btnRotas = document.getElementById('btnRotas');
      const btnTarefas = document.getElementById('btnTarefas');

      btnRotas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50 font-semibold";
      btnTarefas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50 font-semibold";

      if (aba === 'rotas') {
        btnRotas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl bg-zinc-800 text-white font-semibold";
        document.getElementById('tituloPainel').textContent = 'Minhas Rotas';
        carregarRotas();
      }

      if (aba === 'tarefas') {
        btnTarefas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl bg-zinc-800 text-white font-semibold";
        document.getElementById('tituloPainel').textContent = 'Minhas Tarefas';
        carregarTarefas();
      }
    }

    async function carregarRotas() {
      const conteudo = document.getElementById('conteudoPainel');
      conteudo.innerHTML = '<div class="text-zinc-500 py-12 text-center animate-pulse">Carregando rotas...</div>';

      const token = localStorage.getItem('token');

      try {
        const res = await fetch('/api/rotas', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const rotas = await res.json();

        if (res.ok) {
          renderRotas(rotas);
        } else {
          conteudo.innerHTML = '<div class="text-rose-400 py-12 text-center">Erro ao carregar rotas.</div>';
        }
      } catch (err) {
        conteudo.innerHTML = '<div class="text-rose-400 py-12 text-center">Erro de conexão.</div>';
      }
    }

    function renderRotas(rotas) {
      const conteudo = document.getElementById('conteudoPainel');

      if (!rotas || rotas.length === 0) {
        conteudo.innerHTML = '<p class="text-zinc-500 py-12 text-center">Você não possui rotas designadas no momento.</p>';
        return;
      }

      let html = '<div class="flex flex-col gap-5">';

      rotas.forEach(rota => {
        const d = new Date(rota.data);
        const dateStr = !isNaN(d) ? d.toLocaleDateString('pt-BR') : rota.data;
        const statusClass = STATUS_COLORS[rota.status] || "bg-zinc-800 text-zinc-400";

        html += `
          <div class="bg-gradient-to-r from-zinc-900 to-zinc-900/40 border border-zinc-800/80 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 hover:border-blue-500/30 transition-all">

            <div>
              <p class="text-[11px] font-bold tracking-widest text-zinc-500 uppercase mb-1">Rota Operacional #${rota.id}</p>
              <h3 class="text-xl font-semibold text-white">${dateStr}</h3>
              <p class="text-sm text-zinc-500 mt-1">
                Motorista: ${rota.motorista_nome || rota.motorista_id || 'Não definido'}
              </p>
            </div>

            <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
              <span class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">
                ${rota.status}
              </span>

              <select id="status-${rota.id}" class="bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-white text-sm">
                <option value="PLANEJADA" ${rota.status === 'PLANEJADA' ? 'selected' : ''}>Planejada</option>
                <option value="EM_EXECUCAO" ${rota.status === 'EM_EXECUCAO' ? 'selected' : ''}>Em Execução</option>
                <option value="FINALIZADA" ${rota.status === 'FINALIZADA' ? 'selected' : ''}>Finalizada</option>
              </select>

              <button onclick="updateRotaStatus(${rota.id})" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                Salvar
              </button>

              <button onclick="viewRouteMap(${rota.id})" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                Ver Melhor Rota
              </button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      conteudo.innerHTML = html;
    }

    async function updateRotaStatus(id) {
      const token = localStorage.getItem('token');
      const status = document.getElementById(`status-${id}`).value;

      try {
        const res = await fetch(`/api/rotas/${id}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        });

        if (res.ok) {
          alert('Status atualizado com sucesso!');
          carregarRotas();
        } else {
          alert('Erro ao atualizar status.');
        }
      } catch (err) {
        alert('Erro de conexão.');
      }
    }

    async function carregarTarefas() {
      const conteudo = document.getElementById('conteudoPainel');
      conteudo.innerHTML = '<div class="text-zinc-500 py-12 text-center animate-pulse">Carregando tarefas...</div>';

      const token = localStorage.getItem('token');

      try {
        const res = await fetch('/api/tarefas', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const tarefas = await res.json();

        if (res.ok) {
          renderTarefas(tarefas);
        } else {
          conteudo.innerHTML = '<div class="text-rose-400 py-12 text-center">Erro ao carregar tarefas.</div>';
        }
      } catch (err) {
        conteudo.innerHTML = '<div class="text-rose-400 py-12 text-center">Erro de conexão.</div>';
      }
    }

    function renderTarefas(tarefas) {
      const conteudo = document.getElementById('conteudoPainel');

      if (!tarefas || tarefas.length === 0) {
        conteudo.innerHTML = '<p class="text-zinc-500 py-12 text-center">Você não possui tarefas designadas no momento.</p>';
        return;
      }

      const statusCols = {
        'EM_ANDAMENTO': { title: 'A Fazer', border: 'border-blue-500/30' },
        'ENTREGUE': { title: 'Entregue', border: 'border-orange-500/30' },
        'COLETADO': { title: 'Coletado', border: 'border-red-500/30' },
        'CANCELADO': { title: 'Cancelado', border: 'border-zinc-500/30' },
        'JUSTIFICADO': { title: 'Justificado', border: 'border-purple-500/30' }
      };

      let html = '<div class="flex gap-4 overflow-x-auto pb-4 h-full min-h-[600px] p-2">';

      Object.keys(statusCols).forEach(statusKey => {
        const col = statusCols[statusKey];
        const tarefasStatus = tarefas.filter(t => t.status === statusKey);

        html += `
          <div class="flex flex-col min-w-[320px] max-w-[320px] bg-zinc-950/80 border border-zinc-800 rounded-2xl flex-shrink-0"
               ondragover="allowDrop(event)" ondrop="dropTask(event, '${statusKey}')">

            <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
              <h3 class="text-white font-bold tracking-wide">${col.title}</h3>
              <span class="bg-zinc-800 text-zinc-400 text-xs px-2 py-1 rounded-md font-bold">${tarefasStatus.length}</span>
            </div>

            <div class="p-3 flex flex-col gap-3 flex-1 overflow-y-auto min-h-[100px]">
        `;

        tarefasStatus.forEach(tarefa => {
          const d = new Date(tarefa.data_agendada);
          const dateStr = !isNaN(d)
            ? d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            : tarefa.data_agendada;

          const enderecoLimpo = limparEnderecoParaMaps(tarefa.endereco_execucao || '');

          let icon = '';
          let textColor = '';

          if (tarefa.tipo === 'ENTREGA') {
            icon = '⬇️';
            textColor = 'text-green-400';
          }

          if (tarefa.tipo === 'COLETA') {
            icon = '⬆️';
            textColor = 'text-red-400';
          }

          if (tarefa.tipo === 'TROCA') {
            icon = '🔄';
            textColor = 'text-blue-400';
          }

          html += `
            <div id="task-${tarefa.id}" draggable="true" ondragstart="dragTask(event, ${tarefa.id})"
                 class="bg-zinc-900 border ${col.border} rounded-xl p-4 cursor-grab active:cursor-grabbing hover:border-zinc-500 transition-colors shadow-lg group">

              <div class="flex justify-between items-start mb-3">
                <span class="text-[10px] font-bold ${textColor} tracking-widest uppercase flex items-center gap-1">
                  ${icon} ${tarefa.tipo}
                </span>
                <span class="text-zinc-500 text-xs font-mono">#${tarefa.id}</span>
              </div>

              <h4 class="text-white font-semibold text-sm mb-2 line-clamp-2">
                ${tarefa.cliente_nome || 'Cliente não definido'}
              </h4>

              <div class="flex items-start gap-2 mb-3">
                <span class="text-zinc-400 text-xs line-clamp-2 flex-1">
                  📍 ${tarefa.endereco_execucao || 'Endereço não informado'}
                </span>

                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoLimpo)}" target="_blank"
                   class="p-1.5 bg-zinc-800 hover:bg-indigo-600 rounded-lg text-zinc-400 hover:text-white transition-all">
                  Mapa
                </a>
              </div>

              <div class="flex justify-between items-center text-[10px] text-zinc-500 font-medium">
                <span>Caçamba: #${tarefa.cacamba_id || '-'}</span>
                <span>${dateStr || '-'}</span>
              </div>

            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      html += '</div>';
      conteudo.innerHTML = html;
    }

    function allowDrop(ev) {
      ev.preventDefault();
    }

    function dragTask(ev, taskId) {
      ev.dataTransfer.setData("taskId", taskId);
    }

    async function dropTask(ev, newStatus) {
      ev.preventDefault();

      const taskId = ev.dataTransfer.getData("taskId");
      if (!taskId) return;

      const token = localStorage.getItem('token');

      try {
        const res = await fetch(`/api/tarefas/${taskId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: newStatus })
        });

        if (res.ok) {
          carregarTarefas();
        } else {
          alert('Erro ao atualizar status da tarefa.');
        }
      } catch (err) {
        alert('Erro de conexão ao atualizar tarefa.');
      }
    }

    async function viewRouteMap(rotaId) {
      const token = localStorage.getItem('token');

      try {
        const res = await fetch(`/api/rotas/${rotaId}/tarefas`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (res.ok) {
          const tarefas = await res.json();

          if (tarefas.length === 0) {
            alert('Esta rota não possui tarefas cadastradas.');
            return;
          }

          const tarefasComEndereco = tarefas
            .map(tarefa => ({
              ...tarefa,
              endereco_maps: limparEnderecoParaMaps(tarefa.endereco_execucao)
            }))
            .filter(tarefa => tarefa.endereco_maps);

          if (tarefasComEndereco.length === 0) {
            alert('Nenhuma tarefa possui endereço válido para abrir no Maps.');
            return;
          }

          const origin = encodeURIComponent("Rua Visconde de Taunay, Joinville, SC");

          const destination = encodeURIComponent(
            tarefasComEndereco[tarefasComEndereco.length - 1].endereco_maps
          );

          let waypointsStr = '';

          if (tarefasComEndereco.length > 1) {
            const wpArr = tarefasComEndereco
              .slice(0, -1)
              .map(tarefa => encodeURIComponent(tarefa.endereco_maps));

            waypointsStr = `&waypoints=${wpArr.join('|')}`;
          }

          const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${waypointsStr}&travelmode=driving`;

          window.open(mapsUrl, '_blank');
        } else {
          alert('Erro ao buscar tarefas da rota.');
        }
      } catch (err) {
        alert('Erro de conexão ao buscar tarefas.');
      }
    }

    carregarRotas();
  </script>
</body>
</html>

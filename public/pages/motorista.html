<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Motorista | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>

  <script>
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');

    if (!token || !userStr) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userStr);
      if (user.role !== 'motorista' && user.role !== 'admin') {
        window.location.href = 'login.html';
      }
    }
  </script>
</head>

<body class="bg-slate-50 text-slate-700 min-h-screen relative overflow-x-hidden selection:bg-teal-100 selection:text-teal-900">

  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-teal-100 to-emerald-50 blur-[120px] rounded-full"></div>
  </div>

  <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-teal-600 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-teal-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-slate-800">Painel<span class="text-teal-600">Motorista</span></span>
      </div>

      <button onclick="logout()" class="text-slate-500 hover:text-slate-800 transition-colors">
        Sair
      </button>
    </div>
  </nav>

  <main class="pt-32 pb-24 px-6 relative z-10 max-w-7xl mx-auto">

    <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white border border-slate-200 p-8 rounded-3xl shadow-sm">
      <div>
        <h1 class="text-3xl font-bold text-slate-800">Painel do Motorista</h1>
        <p class="text-slate-500 mt-1">Bem-vindo, <span id="motorista-nome" class="font-medium">Carregando...</span></p>
      </div>
      <div class="mt-4 md:mt-0 flex gap-4">
        <button id="btn-simular-gps" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-emerald-100 border border-emerald-200 text-emerald-700 hover:bg-emerald-200 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          Iniciar Sinal GPS
        </button>
      </div>
    </header>

    <div class="bg-white border border-slate-200 rounded-2xl p-2 mb-8 shadow-sm">
      <div class="flex flex-wrap gap-2">
        <button id="btnRotas" onclick="trocarAba('rotas')" class="tipo-btn flex-1 px-4 py-3 rounded-xl bg-teal-600 text-white font-semibold shadow-md">
          Rotas
        </button>

        <button id="btnTarefas" onclick="trocarAba('tarefas')" class="tipo-btn flex-1 px-4 py-3 rounded-xl text-slate-500 hover:text-slate-700 hover:bg-slate-100 font-semibold">
          Tarefas / Kanban
        </button>
      </div>
    </div>

    <section class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
      <div class="flex justify-between items-center mb-6">
        <h2 id="tituloPainel" class="text-2xl font-bold text-slate-800">Minhas Rotas</h2>
      </div>

      <div id="conteudoPainel" class="min-h-[400px]">
        <div class="text-slate-400 py-12 text-center animate-pulse">Carregando...</div>
      </div>
    </section>

  </main>

  <script>
    const STATUS_COLORS = {
      PLANEJADA: "bg-sky-50 text-sky-700 ring-sky-200",
      EM_EXECUCAO: "bg-cyan-50 text-cyan-700 ring-cyan-200",
      FINALIZADA: "bg-teal-50 text-teal-700 ring-teal-200",
      EM_ANDAMENTO: "bg-sky-50 text-sky-700 ring-sky-200",
      ENTREGUE: "bg-amber-50 text-amber-700 ring-amber-200",
      COLETADO: "bg-red-50 text-red-600 ring-red-200",
      CANCELADO: "bg-slate-100 text-slate-500 ring-slate-200",
      JUSTIFICADO: "bg-purple-50 text-purple-700 ring-purple-200"
    };

    let abaAtual = 'rotas';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function limparEnderecoParaMaps(endereco) {
      if (!endereco) return '';

      let enderecoLimpo = endereco;

      enderecoLimpo = enderecoLimpo
        .replace(/\s*-\s*Ref:.*$/i, '')
        .replace(/\s*\|\s*Ref:.*$/i, '')
        .replace(/\s*Referência:.*$/i, '')
        .replace(/\s*Referencia:.*$/i, '')
        .replace(/\s*-\s*Referência:.*$/i, '')
        .replace(/\s*-\s*Referencia:.*$/i, '');

      enderecoLimpo = enderecoLimpo.replace(
        /(,\s*\d+)\s*-\s*[^,]+(,)/i,
        '$1$2'
      );

      enderecoLimpo = enderecoLimpo
        .replace(/\s+/g, ' ')
        .replace(/\s+,/g, ',')
        .replace(/,\s+/g, ', ')
        .trim();

      if (!/Joinville/i.test(enderecoLimpo)) {
        enderecoLimpo += ', Joinville, SC';
      }

      return enderecoLimpo;
    }

    function trocarAba(aba) {
      abaAtual = aba;

      const btnRotas = document.getElementById('btnRotas');
      const btnTarefas = document.getElementById('btnTarefas');

      btnRotas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl text-slate-500 hover:text-slate-700 hover:bg-slate-100 font-semibold";
      btnTarefas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl text-slate-500 hover:text-slate-700 hover:bg-slate-100 font-semibold";

      if (aba === 'rotas') {
        btnRotas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl bg-teal-600 text-white font-semibold shadow-md";
        document.getElementById('tituloPainel').textContent = 'Minhas Rotas';
        carregarRotas();
      }

      if (aba === 'tarefas') {
        btnTarefas.className = "tipo-btn flex-1 px-4 py-3 rounded-xl bg-teal-600 text-white font-semibold shadow-md";
        document.getElementById('tituloPainel').textContent = 'Minhas Tarefas';
        carregarTarefas();
      }
    }

    async function carregarRotas() {
      const conteudo = document.getElementById('conteudoPainel');
      conteudo.innerHTML = '<div class="text-slate-400 py-12 text-center animate-pulse">Carregando rotas...</div>';

      const token = localStorage.getItem('token');

      try {
        const res = await fetch('/api/rotas', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const rotas = await res.json();

        if (res.ok) {
          renderRotas(rotas);
        } else {
          conteudo.innerHTML = '<div class="text-red-500 py-12 text-center">Erro ao carregar rotas.</div>';
        }
      } catch (err) {
        conteudo.innerHTML = '<div class="text-red-500 py-12 text-center">Erro de conexão.</div>';
      }
    }

    function renderRotas(rotas) {
      const conteudo = document.getElementById('conteudoPainel');

      if (!rotas || rotas.length === 0) {
        conteudo.innerHTML = '<p class="text-slate-400 py-12 text-center">Você não possui rotas designadas no momento.</p>';
        return;
      }

      let html = '<div class="flex flex-col gap-5">';

      rotas.forEach(rota => {
        const d = new Date(rota.data);
        const dateStr = !isNaN(d) ? d.toLocaleDateString('pt-BR') : rota.data;
        const statusClass = STATUS_COLORS[rota.status] || "bg-slate-100 text-slate-500";

        html += `
          <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 hover:border-teal-300 transition-all">

            <div>
              <p class="text-[11px] font-bold tracking-widest text-slate-400 uppercase mb-1">Rota Operacional #${rota.id}</p>
              <h3 class="text-xl font-semibold text-slate-800">${dateStr}</h3>
              <p class="text-sm text-slate-400 mt-1">
                Motorista: ${rota.motorista_nome || rota.motorista_id || 'Não definido'}
              </p>
            </div>

            <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
              <span class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">
                ${rota.status}
              </span>

              <select id="status-${rota.id}" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-slate-700 text-sm">
                <option value="PLANEJADA" ${rota.status === 'PLANEJADA' ? 'selected' : ''}>Planejada</option>
                <option value="EM_EXECUCAO" ${rota.status === 'EM_EXECUCAO' ? 'selected' : ''}>Em Execução</option>
                <option value="FINALIZADA" ${rota.status === 'FINALIZADA' ? 'selected' : ''}>Finalizada</option>
              </select>

              <button onclick="updateRotaStatus(${rota.id})" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm">
                Salvar
              </button>

              <button onclick="viewRouteMap(${rota.id})" class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm">
                Ver Melhor Rota
              </button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      conteudo.innerHTML = html;
    }

    async function updateRotaStatus(id) {
      const token = localStorage.getItem('token');
      const status = document.getElementById(`status-${id}`).value;

      try {
        const res = await fetch(`/api/rotas/${id}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        });

        if (res.ok) {
          alert('Status atualizado com sucesso!');
          carregarRotas();
        } else {
          alert('Erro ao atualizar status.');
        }
      } catch (err) {
        alert('Erro de conexão.');
      }
    }

    async function carregarTarefas() {
      const conteudo = document.getElementById('conteudoPainel');
      conteudo.innerHTML = '<div class="text-slate-400 py-12 text-center animate-pulse">Carregando tarefas...</div>';

      const token = localStorage.getItem('token');

      try {
        const res = await fetch('/api/tarefas', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const tarefas = await res.json();

        if (res.ok) {
          renderTarefas(tarefas);
        } else {
          conteudo.innerHTML = '<div class="text-red-500 py-12 text-center">Erro ao carregar tarefas.</div>';
        }
      } catch (err) {
        conteudo.innerHTML = '<div class="text-red-500 py-12 text-center">Erro de conexão.</div>';
      }
    }

    function renderTarefas(tarefas) {
      const conteudo = document.getElementById('conteudoPainel');

      if (!tarefas || tarefas.length === 0) {
        conteudo.innerHTML = '<p class="text-slate-400 py-12 text-center">Você não possui tarefas designadas no momento.</p>';
        return;
      }

      const statusCols = {
        'EM_ANDAMENTO': { title: 'A Fazer', border: 'border-sky-200' },
        'ENTREGUE': { title: 'Entregue', border: 'border-amber-200' },
        'COLETADO': { title: 'Coletado', border: 'border-red-200' },
        'CANCELADO': { title: 'Cancelado', border: 'border-slate-200' },
        'JUSTIFICADO': { title: 'Justificado', border: 'border-purple-200' }
      };

      let html = '<div class="flex gap-4 overflow-x-auto pb-4 h-full min-h-[600px] p-2">';

      Object.keys(statusCols).forEach(statusKey => {
        const col = statusCols[statusKey];
        const tarefasStatus = tarefas.filter(t => t.status === statusKey);

        html += `
          <div class="flex flex-col min-w-[320px] max-w-[320px] bg-slate-50 border border-slate-200 rounded-2xl flex-shrink-0"
               ondragover="allowDrop(event)" ondrop="dropTask(event, '${statusKey}')">

            <div class="p-4 border-b border-slate-200 flex justify-between items-center">
              <h3 class="text-slate-800 font-bold tracking-wide">${col.title}</h3>
              <span class="bg-white text-slate-500 text-xs px-2 py-1 rounded-md font-bold border border-slate-200">${tarefasStatus.length}</span>
            </div>

            <div class="p-3 flex flex-col gap-3 flex-1 overflow-y-auto min-h-[100px]">
        `;

        tarefasStatus.forEach(tarefa => {
          const d = new Date(tarefa.data_agendada);
          const dateStr = !isNaN(d)
            ? d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            : tarefa.data_agendada;

          const enderecoLimpo = limparEnderecoParaMaps(tarefa.endereco_execucao || '');

          let icon = '';
          let textColor = '';

          if (tarefa.tipo === 'ENTREGA') {
            icon = '⬇️';
            textColor = 'text-emerald-600';
          }

          if (tarefa.tipo === 'COLETA') {
            icon = '⬆️';
            textColor = 'text-red-500';
          }

          if (tarefa.tipo === 'TROCA') {
            icon = '🔄';
            textColor = 'text-sky-600';
          }

          html += `
            <div id="task-${tarefa.id}" draggable="true" ondragstart="dragTask(event, ${tarefa.id})"
                 class="bg-white border ${col.border} rounded-xl p-4 cursor-grab active:cursor-grabbing hover:border-teal-300 transition-colors shadow-sm group">

              <div class="flex justify-between items-start mb-3">
                <span class="text-[10px] font-bold ${textColor} tracking-widest uppercase flex items-center gap-1">
                  ${icon} ${tarefa.tipo}
                </span>
                <span class="text-slate-400 text-xs font-mono">#${tarefa.id}</span>
              </div>

              <h4 class="text-slate-800 font-semibold text-sm mb-1 line-clamp-2">
                ${tarefa.cliente_nome || 'Cliente não definido'}
              </h4>
              ${tarefa.preco ? `<div class="text-[11px] font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-200 mb-1 inline-block">💰 Cobrar: R$ ${parseFloat(tarefa.preco).toFixed(2).replace('.', ',')}</div>` : ''}
              ${tarefa.forma_pagamento ? `<div class="text-[11px] font-bold text-slate-700 bg-slate-50 px-2 py-1 rounded-lg border border-slate-200 mb-2 inline-block">💳 Pgto: ${tarefa.forma_pagamento.replace(/_/g, ' ')}${tarefa.forma_pagamento === 'DINHEIRO_ENTREGA' && tarefa.troco_para ? ` (Troco p/ R$ ${parseFloat(tarefa.troco_para).toFixed(2).replace('.', ',')})` : ''}</div>` : '<div class="mb-2"></div>'}

              <div class="flex items-start gap-2 mb-3">
                <span class="text-slate-500 text-xs line-clamp-2 flex-1">
                  📍 ${tarefa.endereco_execucao || 'Endereço não informado'}
                </span>

                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoLimpo)}" target="_blank"
                   class="p-1.5 bg-slate-100 hover:bg-teal-600 rounded-lg text-slate-400 hover:text-white transition-all">
                  Mapa
                </a>
              </div>

              <div class="flex justify-between items-center text-[10px] text-slate-400 font-medium">
                <span>Caçamba: #${tarefa.cacamba_id || '-'}</span>
                <span>${dateStr || '-'}</span>
              </div>

            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      html += '</div>';
      conteudo.innerHTML = html;
    }

    function allowDrop(ev) {
      ev.preventDefault();
    }

    function dragTask(ev, taskId) {
      ev.dataTransfer.setData("taskId", taskId);
    }

    async function dropTask(ev, newStatus) {
      ev.preventDefault();

      const taskId = ev.dataTransfer.getData("taskId");
      if (!taskId) return;

      const token = localStorage.getItem('token');

      try {
        const res = await fetch(`/api/tarefas/${taskId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: newStatus })
        });

        if (res.ok) {
          carregarTarefas();
        } else {
          alert('Erro ao atualizar status da tarefa.');
        }
      } catch (err) {
        alert('Erro de conexão ao atualizar tarefa.');
      }
    }

    async function viewRouteMap(rotaId) {
      const token = localStorage.getItem('token');

      try {
        const res = await fetch(`/api/rotas/${rotaId}/tarefas`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (res.ok) {
          const tarefas = await res.json();

          if (tarefas.length === 0) {
            alert('Esta rota não possui tarefas cadastradas.');
            return;
          }

          const tarefasComEndereco = tarefas
            .map(tarefa => ({
              ...tarefa,
              endereco_maps: limparEnderecoParaMaps(tarefa.endereco_execucao)
            }))
            .filter(tarefa => tarefa.endereco_maps);

          if (tarefasComEndereco.length === 0) {
            alert('Nenhuma tarefa possui endereço válido para abrir no Maps.');
            return;
          }

          const origin = encodeURIComponent("Rua Visconde de Taunay, Joinville, SC");

          const destination = encodeURIComponent(
            tarefasComEndereco[tarefasComEndereco.length - 1].endereco_maps
          );

          let waypointsStr = '';

          if (tarefasComEndereco.length > 1) {
            const wpArr = tarefasComEndereco
              .slice(0, -1)
              .map(tarefa => encodeURIComponent(tarefa.endereco_maps));

            waypointsStr = `&waypoints=${wpArr.join('|')}`;
          }

          const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${waypointsStr}&travelmode=driving`;

          window.open(mapsUrl, '_blank');
        } else {
          alert('Erro ao buscar tarefas da rota.');
        }
      } catch (err) {
        alert('Erro de conexão ao buscar tarefas.');
      }
    }

    carregarRotas();

    // Lógica do Mock GPS
    let gpsInterval = null;
    let currentLat = -26.3045;
    let currentLng = -48.8487;

    const btnGps = document.getElementById('btn-simular-gps');
    if(btnGps) {
      btnGps.addEventListener('click', () => {
        if (gpsInterval) {
          clearInterval(gpsInterval);
          gpsInterval = null;
          gpsAtivo = false;
          btnGps.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg> Iniciar Sinal GPS';
          btnGps.classList.replace('text-red-700', 'text-emerald-700');
        } else {
          gpsAtivo = true;
          btnGps.innerHTML = '🔴 Parar Sinal GPS';
          btnGps.classList.replace('text-emerald-700', 'text-red-700');
          
          let currentLat = -26.3012; // R. Visconde de Taunay
          let currentLng = -48.8490;
          
          gpsInterval = setInterval(async () => {
            currentLat += 0.005;
            currentLng += 0.005;
            
            try {
              await fetch('/api/localizacao/atualizar', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ latitude: currentLat, longitude: currentLng })
              });
            } catch(e) {}
          }, 500); // Atualiza a cada meio segundo
        }
      });
    }
  </script>
  <script src="../js/notificacoes.js"></script>
</body>
</html>

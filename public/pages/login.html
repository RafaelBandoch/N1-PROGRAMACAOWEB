<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen relative overflow-hidden flex items-center justify-center selection:bg-teal-100 selection:text-teal-900">

  <!-- Background Blur Orbs -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] opacity-30 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-teal-200 to-emerald-100 blur-[120px] rounded-full"></div>
  </div>

  <div class="relative z-10 w-full max-w-md p-8">
    <div class="text-center mb-8">
      <a href="../landing.html" class="inline-flex items-center gap-3 mb-6 hover:scale-105 transition-transform">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-teal-600 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-teal-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-slate-800">Caçambas<span class="text-teal-600">PRO</span></span>
      </a>
      <h1 class="text-3xl font-bold text-slate-800 mb-2">Bem-vindo de volta</h1>
      <p class="text-slate-500">Faça login para acessar sua conta.</p>
    </div>

    <div class="bg-white/80 backdrop-blur-md border border-slate-200 rounded-3xl p-8 shadow-xl">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">E-mail</label>
          <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Senha</label>
          <input type="password" id="senha" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="••••••••">
        </div>
        
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg text-center"></div>

        <button type="submit" class="w-full py-4 rounded-xl bg-teal-600 hover:bg-teal-700 text-white font-bold text-lg transition-all shadow-md shadow-teal-600/20 flex items-center justify-center gap-2">
          Entrar
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
      </form>
      
      <p class="text-center mt-6 text-slate-500 text-sm">
        Ainda não tem conta? <a href="cadastro.html" class="text-teal-600 hover:text-teal-700 font-medium">Cadastre-se agora</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const errorDiv = document.getElementById('errorMessage');
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.usuario));
          
          if (data.usuario.role === 'admin') {
          window.location.href = 'admin.html';
          } else if (data.usuario.role === 'motorista') {
            window.location.href = '/pages/motorista.html';
          } else {
            window.location.href = '/pages/meus-pedidos.html';
          }
        } else {
          errorDiv.textContent = data.error || 'Erro ao fazer login';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>

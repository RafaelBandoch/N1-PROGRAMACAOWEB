<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen relative overflow-hidden flex items-center justify-center selection:bg-blue-500 selection:text-white">

  <!-- Background Blur Orbs -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 blur-[120px] rounded-full mix-blend-screen"></div>
  </div>

  <div class="relative z-10 w-full max-w-md p-8">
    <div class="text-center mb-8">
      <a href="../landing.html" class="inline-flex items-center gap-3 mb-6 hover:scale-105 transition-transform">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-blue-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-white">Caçambas<span class="text-blue-500">PRO</span></span>
      </a>
      <h1 class="text-3xl font-bold text-white mb-2">Bem-vindo de volta</h1>
      <p class="text-zinc-400">Faça login para acessar sua conta.</p>
    </div>

    <div class="bg-zinc-900/80 backdrop-blur-md border border-white/10 rounded-3xl p-8 shadow-2xl">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">E-mail</label>
          <input type="email" id="email" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="seu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Senha</label>
          <input type="password" id="senha" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="••••••••">
        </div>
        
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg text-center"></div>

        <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-lg transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2">
          Entrar
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
      </form>
      
      <p class="text-center mt-6 text-zinc-400 text-sm">
        Ainda não tem conta? <a href="cadastro.html" class="text-blue-400 hover:text-blue-300 font-medium">Cadastre-se agora</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const errorDiv = document.getElementById('errorMessage');
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.usuario));
          
          if (data.usuario.role === 'admin') {
            window.location.href = '/pages/gestao.html';
          } else if (data.usuario.role === 'motorista') {
            window.location.href = '/pages/motorista.html';
          } else {
            window.location.href = '/pages/meus-pedidos.html';
          }
        } else {
          errorDiv.textContent = data.error || 'Erro ao fazer login';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>

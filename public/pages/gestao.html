<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Detalhada</title>
    <link rel="stylesheet" href="../css/output.css">
    <script>
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      
      if (!token || !userStr) {
        window.location.href = 'login.html';
      } else {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
          window.location.href = 'login.html';
        }
      }
    </script>
</head>
<body class="bg-black text-zinc-200 min-h-screen font-sans">

<!-- Navbar -->
<nav class="w-full bg-zinc-950/80 backdrop-blur-md border-b border-white/5 mb-8 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-extrabold text-sm shadow-lg shadow-blue-500/20">
        C
      </div>
      <span class="text-xl font-bold tracking-tight text-white">Caçambas<span class="text-blue-500">PRO</span></span>
    </div>
    <div class="flex items-center gap-4">
      <span id="userEmailDisplay" class="text-sm font-medium text-zinc-400 hidden sm:block"></span>
      <button onclick="logout()" class="text-sm font-semibold text-rose-400 hover:text-rose-300 bg-rose-500/10 hover:bg-rose-500/20 px-4 py-2 rounded-lg transition-colors">
        Sair
      </button>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 pb-10">

    <h1 class="text-4xl font-bold text-white mb-8">Gestão Detalhada</h1>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-2 mb-8 shadow-2xl">
        <div class="flex flex-wrap gap-2">
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="usuarios">Usuários</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="veiculos">Veículos</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="motoristas">Motoristas</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="clientes">Clientes</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="cacambas">Caçambas</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="rotas">Rotas</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="tarefas">Tarefas</button>
        </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-xl">
        <div class="flex justify-between items-center mb-8">
            <h2 id="titulo-lista" class="text-2xl font-bold text-white tracking-tight">Selecione uma aba</h2>
            <button id="btn-cadastrar" class="bg-white text-black hover:bg-zinc-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-transform active:scale-95">
                + Novo Registro
            </button>
        </div>

        <div id="lista-conteudo" class="bg-zinc-950/50 border border-zinc-800 rounded-2xl overflow-hidden min-h-[300px]">
            </div>
    </div>
</div>

<div id="modal-container"></div>

<!-- Modal do Mapa -->
<div id="mapModal" class="fixed inset-0 z-[60] bg-zinc-950/90 backdrop-blur-sm hidden flex-col items-center justify-center p-6">
  <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden shadow-2xl relative">
    <div class="p-4 border-b border-white/5 flex justify-between items-center bg-zinc-900 z-10">
      <h2 class="text-xl font-bold text-white">Trajeto Otimizado (Google Maps)</h2>
      <button onclick="closeMapModal()" class="text-zinc-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-lg p-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div id="map" class="flex-1 w-full bg-zinc-800"></div>
  </div>
</div>

<script>
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.email) {
      document.getElementById('userEmailDisplay').textContent = user.email;
    }
  });
</script>
<script src="../js/gestao.js?v=3"></script>
</body>
</html>

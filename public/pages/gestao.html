<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Detalhada</title>
    <link rel="stylesheet" href="../css/output.css">
</head>
<body class="bg-black text-zinc-200 min-h-screen font-sans selection:bg-indigo-500/30">

<div class="max-w-6xl mx-auto px-6 py-10">
    <a href="../index.html" class="text-zinc-500 hover:text-white text-sm flex items-center gap-2 mb-4 transition-colors">
        ← Voltar ao Dashboard
    </a>

    <h1 class="text-4xl font-bold text-white mb-8">Gestão Detalhada</h1>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-2 mb-8 shadow-2xl">
        <div class="flex flex-wrap gap-2">
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="usuarios">Usuários</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="veiculos">Veículos</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="motoristas">Motoristas</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="clientes">Clientes</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="cacambas">Caçambas</button>
            <button class="tipo-btn flex-1 px-4 py-2 rounded-xl transition-all" data-tipo="rotas">Rotas</button>
        </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-xl">
        <div class="flex justify-between items-center mb-8">
            <h2 id="titulo-lista" class="text-2xl font-bold text-white tracking-tight">Selecione uma aba</h2>
            <button id="btn-cadastrar" class="bg-white text-black hover:bg-zinc-200 px-6 py-2.5 rounded-xl text-sm font-bold transition-transform active:scale-95">
                + Novo Registro
            </button>
        </div>

        <div id="lista-conteudo" class="bg-zinc-950/50 border border-zinc-800 rounded-2xl overflow-hidden min-h-[300px]">
            </div>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300 opacity-0">
    <div id="modal-inner" class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-md p-8 shadow-2xl transform scale-95 opacity-0 transition-all duration-300">
        <div class="flex justify-between items-center mb-8">
            <h2 id="modal-titulo" class="text-2xl font-bold text-white">Cadastrar</h2>
            <button id="btn-fechar-modal" class="text-zinc-500 hover:text-white p-2">✕</button>
        </div>

        <div id="modal-alerta" class="mb-6"></div>

        <form id="modal-form" class="space-y-5">
            <div id="modal-campos" class="space-y-4"></div>
            <div class="flex gap-3 pt-6">
                <button type="submit" id="btn-salvar-modal" class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-zinc-200 transition-colors">Salvar</button>
                <button type="button" id="btn-cancelar-modal" class="flex-1 bg-zinc-800 text-white font-bold py-3 rounded-xl hover:bg-zinc-700 transition-colors">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<template id="form-field-template">
    <div class="space-y-1.5">
        <label class="field-label text-xs font-bold text-zinc-500 uppercase ml-1"></label>
        <div class="field-container"></div>
    </div>
</template>

<template id="form-input-template">
    <input class="w-full bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/20 focus:border-zinc-500 transition-all" />
</template>

<template id="form-select-template">
    <select class="w-full bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/20 transition-all">
        <option value="" class="bg-zinc-900">Selecione...</option>
    </select>
</template>

<script src="../js/gestao.js"></script>
</body>
</html>

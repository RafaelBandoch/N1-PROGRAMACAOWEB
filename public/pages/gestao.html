<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão Detalhada - Caçambas</title>
    <link rel="stylesheet" href="../css/output.css" />
  </head>
  <body class="relative min-h-screen font-sans bg-slate-50">
    <!-- BG Blob -->
    <div class="fixed inset-0 z-[-1] bg-gradient-to-br from-indigo-50 via-white to-purple-50"></div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-10">
      
      <!-- Premium Header Navigation -->
      <nav class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
          <a href="../index.html" class="inline-flex items-center text-sm font-medium text-green-900 hover:text-indigo-800 transition-colors mb-3 group">
            <svg class="w-4 h-4 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Voltar ao Dashboard
          </a>
          <h1 class="text-4xl font-extrabold bg-clip-text text-indigo-600 tracking-tight">
            Gestão Detalhada
          </h1>
        </div>
      </nav>

      <!-- Glass Tab Selector -->
      <div class="glass p-2 rounded-2xl mb-8 border border-white/60 shadow-sm">
        <div class="flex flex-wrap gap-2" id="tabs-container">
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 bg-white text-indigo-600 shadow-sm ring-1 ring-slate-900/5 group" data-tipo="usuarios">Usuários</button>
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 text-slate-500 hover:text-slate-700 hover:bg-slate-50/80" data-tipo="veiculos">Veículos</button>
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 text-slate-500 hover:text-slate-700 hover:bg-slate-50/80" data-tipo="motoristas">Motoristas</button>
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 text-slate-500 hover:text-slate-700 hover:bg-slate-50/80" data-tipo="clientes">Clientes</button>
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 text-slate-500 hover:text-slate-700 hover:bg-slate-50/80" data-tipo="cacambas">Caçambas</button>
          <button class="tipo-btn flex-1 min-w-[120px] px-6 py-3 rounded-xl text-sm font-semibold transition-all duration-300 text-slate-500 hover:text-slate-700 hover:bg-slate-50/80" data-tipo="rotas">Rotas</button>
        </div>
      </div>

      <!-- Alertas -->
      <div id="alert" class="transition-all duration-300 empty:hidden mb-6"></div>

      <!-- Main Content Card -->
      <div class="glass p-6 md:p-8 rounded-[2rem] border border-white/60 shadow-xl shadow-indigo-900/5">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
          <h2 id="titulo-lista" class="text-2xl font-bold text-slate-800 tracking-tight">Selecione uma aba</h2>
          <button
            id="btn-cadastrar"
            class="px-6 py-3 rounded-xl text-sm font-semibold bg-indigo-600 text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 hover:-translate-y-0.5 transition-all duration-300 disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed disabled:transform-none flex items-center gap-2"
            disabled
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Cadastrar Novo
          </button>
        </div>
        
        <div
          id="lista-conteudo"
          class="bg-white/50 rounded-2xl border border-white/50 overflow-x-auto text-sm min-h-[250px] relative transition-all duration-300"
        >
          <div class="absolute inset-0 flex items-center justify-center text-slate-400 font-medium">
            Selecione uma categoria acima para visualizar.
          </div>
        </div>
      </div>
    </div>

    <!-- Templates -->
    <template id="loading-template">
      <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/50 backdrop-blur-sm z-10">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-3"></div>
        <span class="text-indigo-600 font-medium tracking-wide text-sm">Atualizando dados...</span>
      </div>
    </template>

    <template id="empty-state-template">
      <div class="flex flex-col items-center justify-center p-12 opacity-50">
        <svg class="w-16 h-16 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
        <p class="text-slate-500 font-medium text-lg">Nenhum registro encontrado</p>
        <p class="text-slate-400 text-sm mt-1">Clique em "Cadastrar Novo" para adicionar o primeiro.</p>
      </div>
    </template>

    <template id="error-state-template">
      <div class="flex items-center justify-center p-8">
        <div class="bg-rose-50 text-rose-600 px-4 py-3 rounded-xl border border-rose-100 flex items-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span class="font-medium">Erro ao carregar os dados.</span>
        </div>
      </div>
    </template>

    <template id="table-template">
      <table class="w-full text-left whitespace-nowrap">
        <thead>
          <tr class="table-header-row"></tr>
        </thead>
        <tbody class="divide-y divide-slate-100/80 table-body"></tbody>
      </table>
    </template>

    <template id="form-field-template">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5 field-label"></label>
        <div class="field-container"></div>
      </div>
    </template>

    <template id="form-select-template">
      <div class="relative">
        <select
          class="w-full px-4 py-3 rounded-xl text-sm text-slate-700 border border-slate-200 shadow-sm bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 appearance-none transition-all cursor-pointer"
        ></select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </template>

    <template id="form-input-template">
      <input
        class="w-full px-4 py-3 rounded-xl text-sm text-slate-700 border border-slate-200 shadow-sm bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 transition-all placeholder:text-slate-400"
      />
    </template>

    <!-- Modal (Overhauled) -->
    <div
      id="modal"
      class="opacity-0 hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300"
    >
      <div id="modal-inner" class="bg-white/95 backdrop-blur-xl rounded-[2rem] max-w-md w-full shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] border border-white/50 transform scale-95 opacity-0 transition-all duration-300 ease-out flex flex-col max-h-[90vh]">
        <div class="px-8 py-6 flex justify-between items-center border-b border-slate-100 shrink-0">
          <h2 id="modal-titulo" class="text-2xl font-bold tracking-tight text-slate-900">Cadastrar</h2>
          <button
            id="btn-fechar-modal"
            class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-2 rounded-full transition-colors focus:outline-none"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>

        <div class="p-8 overflow-y-auto custom-scroll">
          <div id="modal-alerta" class="empty:hidden mb-6 transition-all duration-300"></div>
          <form id="modal-form">
            <div id="modal-campos" class="space-y-4"></div>
            <div class="flex gap-4 mt-8">
              <button
                type="submit"
                id="btn-salvar-modal"
                class="flex-1 px-5 py-3 rounded-xl text-sm font-semibold bg-indigo-600 text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 hover:-translate-y-0.5 transition-all duration-300"
              >
                Salvar Registo
              </button>
              <button
                type="button"
                id="btn-cancelar-modal"
                class="flex-1 px-5 py-3 rounded-xl text-sm font-semibold bg-slate-100 text-slate-700 hover:bg-slate-200 transition-all duration-300"
              >
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <style>
      .custom-scroll::-webkit-scrollbar { width: 6px; }
      .custom-scroll::-webkit-scrollbar-track { background: transparent; }
      .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <script src="../js/gestao.js"></script>
  </body>
</html>

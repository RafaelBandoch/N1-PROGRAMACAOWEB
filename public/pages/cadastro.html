<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen relative flex items-center justify-center selection:bg-blue-500 selection:text-white py-12 overflow-y-auto">

  <!-- Background Blur Orbs -->
  <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 blur-[150px] rounded-full mix-blend-screen"></div>
  </div>

  <div class="relative z-10 w-full max-w-xl p-8">
    <div class="text-center mb-8">
      <a href="../landing.html" class="inline-flex items-center gap-3 mb-6 hover:scale-105 transition-transform">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-blue-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-white">Caçambas<span class="text-blue-500">PRO</span></span>
      </a>
      <h1 class="text-3xl font-bold text-white mb-2">Crie sua conta</h1>
      <p class="text-zinc-400">Cadastre-se para começar a alugar caçambas com facilidade.</p>
    </div>

    <div class="bg-zinc-900/80 backdrop-blur-md border border-white/10 rounded-3xl p-8 shadow-2xl">
      <form id="cadastroForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Nome Completo</label>
          <input type="text" id="nome" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="João da Silva">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">E-mail</label>
            <input type="email" id="email" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="joao@email.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">Senha</label>
            <input type="password" id="senha" required minlength="6" class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="••••••••">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">CPF ou CNPJ</label>
          <input type="text" id="cpf_cnpj" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="000.000.000-00">
        </div>
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Endereço de Faturamento</label>
          <input type="text" id="endereco" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="Rua Exemplo, 123, Bairro - Cidade/UF">
        </div>
        
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg text-center"></div>
        <div id="successMessage" class="hidden bg-green-500/10 border border-green-500/50 text-green-500 text-sm p-3 rounded-lg text-center"></div>

        <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-lg transition-all shadow-lg shadow-blue-500/25 flex items-center justify-center mt-4">
          Cadastrar Conta
        </button>
      </form>
      
      <p class="text-center mt-6 text-zinc-400 text-sm">
        Já possui conta? <a href="login.html" class="text-blue-400 hover:text-blue-300 font-medium">Faça login</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const cpf_cnpj = document.getElementById('cpf_cnpj').value;
      const endereco = document.getElementById('endereco').value;
      
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');
      
      try {
        const response = await fetch('/api/auth/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome, email, senha, cpf_cnpj, endereco, role: 'cliente'
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successDiv.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
          successDiv.classList.remove('hidden');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          errorDiv.textContent = data.error || 'Erro ao cadastrar';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | CaçambasPRO</title>
    <link rel="stylesheet" href="../css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Customize scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <script>
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      
      if (!token || !userStr) {
        window.location.href = 'login.html';
      } else {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
          window.location.href = 'login.html';
        }
      }
    </script>
</head>
<body class="bg-slate-50 text-slate-700 h-screen overflow-hidden flex font-sans">

<!-- Sidebar -->
<aside class="w-64 bg-slate-900 flex flex-col shadow-2xl z-20 flex-shrink-0 text-slate-300">
  <div class="h-20 flex items-center px-6 border-b border-slate-800">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-teal-400 flex items-center justify-center text-white font-extrabold text-sm shadow-md shadow-teal-500/20 mr-3">
      C
    </div>
    <span class="text-xl font-bold tracking-tight text-white">Caçambas<span class="text-teal-400">PRO</span></span>
  </div>
  
  <div class="flex-1 py-6 px-4 overflow-y-auto flex flex-col gap-2">
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mb-2">Painel Inicial</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="dashboard">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">📊</span>
      Visão Geral
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="solicitacoes">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">📥</span>
      Solicitações
    </button>
    
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Gestão Estratégica</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="usuarios">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">👤</span>
      Usuários
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="clientes">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">🏢</span>
      Clientes
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="motoristas">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">👷</span>
      Motoristas
    </button>
    
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Operacional</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="veiculos">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">🚛</span>
      Veículos
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="cacambas">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">🗄️</span>
      Caçambas
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="rotas">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">📍</span>
      Rotas
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="tarefas">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">📋</span>
      Tarefas
    </button>
    
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Sistema</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="logs">
      <span class="w-5 text-center text-lg opacity-70 group-hover:opacity-100">💻</span>
      Logs de Acesso
    </button>
  </div>
  
  <div class="p-4 border-t border-slate-800">
    <div class="bg-slate-800 rounded-xl p-4 flex flex-col gap-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-slate-300 font-bold">A</div>
        <div class="overflow-hidden">
          <p class="text-sm font-bold text-white truncate">Administrador</p>
          <p id="userEmailDisplay" class="text-xs text-slate-400 truncate">admin@...</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 py-2 rounded-lg text-sm font-bold transition-colors">
        Sair do Sistema
      </button>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
  <!-- Background blur fixo no fundo da area principal -->
  <div class="absolute top-0 right-0 w-[800px] h-[500px] opacity-20 pointer-events-none z-0">
    <div class="absolute inset-0 bg-gradient-to-r from-teal-200 to-emerald-100 blur-[120px] rounded-full"></div>
  </div>

  <header class="h-20 border-b border-slate-200 flex items-center justify-between px-8 bg-white/50 backdrop-blur-md z-10 flex-shrink-0">
    <div>
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Painel Central</span>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight leading-none" id="titulo-lista">Dashboard</h1>
    </div>
    <div id="nav-actions" class="flex items-center gap-4">
      <button id="btn-cadastrar" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-transform active:scale-95 shadow-md shadow-teal-600/20 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/></svg>
        Novo Registro
      </button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-8 z-10 w-full max-w-[1600px] mx-auto">
    <div id="lista-conteudo" class="w-full min-h-[400px]">
        <!-- Renderizado pelo JS -->
    </div>
  </div>
</main>

<div id="modal-container"></div>

<!-- Modal do Mapa (Google Maps Mock) -->
<div id="mapModal" class="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm hidden flex-col items-center justify-center p-6">
  <div class="bg-white border border-slate-200 rounded-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden shadow-2xl relative">
    <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-white z-10">
      <h2 class="text-xl font-bold text-slate-800">Trajeto Otimizado</h2>
      <button onclick="closeMapModal()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg p-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div id="map" class="flex-1 w-full bg-slate-100"></div>
  </div>
</div>

<script>
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.email) {
      document.getElementById('userEmailDisplay').textContent = user.email;
    }
  });
</script>
<script src="../js/admin.js"></script>
<script src="../js/notificacoes.js"></script>
</body>
</html>

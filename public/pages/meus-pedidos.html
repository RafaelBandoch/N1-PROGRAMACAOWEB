<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pedidos | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
  </style>
  <script>
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');
    
    if (!token || !userStr) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userStr);
      if (user.role !== 'cliente' && user.role !== 'admin') {
        window.location.href = 'login.html';
      }
    }
  </script>
</head>
<body class="bg-black text-zinc-200 min-h-screen font-sans relative overflow-x-hidden">

  <!-- Background Blur -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] opacity-10 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 blur-[120px] rounded-full mix-blend-screen"></div>
  </div>

  <!-- Navbar -->
  <nav class="w-full bg-zinc-950/80 backdrop-blur-md border-b border-white/5 mb-8 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white font-extrabold text-sm shadow-lg shadow-blue-500/20">
          C
        </div>
        <span class="text-xl font-bold tracking-tight text-white">Caçambas<span class="text-blue-500">PRO</span></span>
      </div>
      <div class="flex items-center gap-4">
        <span id="userEmailDisplay" class="text-sm font-medium text-zinc-400 hidden sm:block"></span>
        <button onclick="logout()" class="text-sm font-semibold text-rose-400 hover:text-rose-300 bg-rose-500/10 hover:bg-rose-500/20 px-4 py-2 rounded-lg transition-colors">
          Sair
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 pb-10 relative z-10">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-4xl font-bold text-white mb-1">Meus Pedidos</h1>
        <p class="text-zinc-500 text-sm">Acompanhe o status das suas solicitações de caçambas</p>
      </div>
      <a href="solicitar-cacamba.html" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-transform active:scale-95 shadow-lg shadow-blue-500/20">
        + Nova Solicitação
      </a>
    </div>

    <div id="loading" class="text-zinc-500 py-12 text-center animate-pulse">
      Carregando suas solicitações...
    </div>

    <div id="pedidosList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3 hidden">
      <!-- Pedidos renderizados aqui -->
    </div>
    
    <div id="emptyState" class="hidden bg-zinc-900 border border-zinc-800 rounded-3xl p-12 text-center shadow-xl">
      <div class="text-6xl mb-6">🗑️</div>
      <h3 class="text-xl font-bold text-white mb-2">Nenhum pedido encontrado</h3>
      <p class="text-zinc-400 mb-6 max-w-md mx-auto">Você ainda não realizou nenhuma solicitação de caçamba. Clique no botão abaixo para fazer seu primeiro pedido.</p>
      <a href="solicitar-cacamba.html" class="inline-block bg-white text-black hover:bg-zinc-200 px-8 py-3 rounded-xl text-sm font-bold transition-transform active:scale-95">
        Solicitar Caçamba
      </a>
    </div>
  </main>

  <script>
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user && user.email) {
        document.getElementById('userEmailDisplay').textContent = user.email;
      }
      loadPedidos();
    });

    async function loadPedidos() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/solicitacoes', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        const list = document.getElementById('pedidosList');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('emptyState');
        
        loading.classList.add('hidden');

        if (res.ok) {
          const pedidos = await res.json();
          if (pedidos.length === 0) {
            emptyState.classList.remove('hidden');
          } else {
            renderPedidos(pedidos);
            list.classList.remove('hidden');
          }
        } else {
          alert('Falha ao carregar pedidos');
        }
      } catch (err) {
        console.error('Erro de rede', err);
        alert('Erro de conexão com o servidor');
      }
    }

    function renderPedidos(pedidos) {
      const list = document.getElementById('pedidosList');
      list.innerHTML = '';

      pedidos.forEach(pedido => {
        const dAgendada = new Date(pedido.data_agendada);
        const dCriada = new Date(pedido.created_at);
        const dataFormatada = !isNaN(dAgendada) ? dAgendada.toLocaleDateString('pt-BR') : pedido.data_agendada;
        const dataCriadaFormatada = !isNaN(dCriada) ? dCriada.toLocaleDateString('pt-BR') : '-';
        
        let statusColor = 'text-yellow-400 bg-yellow-500/10 border-yellow-500/20';
        let statusIcon = '⏳';
        let statusText = 'Em Análise';
        
        if (pedido.status === 'ACEITO') {
          statusColor = 'text-blue-400 bg-blue-500/10 border-blue-500/20';
          statusIcon = '✅';
          statusText = 'Aprovado / Em andamento';
        } else if (pedido.status === 'REJEITADO') {
          statusColor = 'text-red-400 bg-red-500/10 border-red-500/20';
          statusIcon = '❌';
          statusText = 'Cancelado';
        }

        const card = document.createElement('div');
        card.className = 'bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-xl flex flex-col hover:border-zinc-700 transition-colors relative group';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <span class="text-[10px] uppercase tracking-widest font-bold text-zinc-500 block mb-1">Pedido #${pedido.id}</span>
              <h3 class="text-lg font-bold text-white uppercase">${pedido.tamanho}</h3>
            </div>
            <div class="px-3 py-1.5 rounded-lg border text-xs font-bold flex items-center gap-1.5 ${statusColor}">
              <span>${statusIcon}</span> ${statusText}
            </div>
          </div>
          
          <div class="space-y-3 mb-6 flex-1">
            <div class="flex gap-3 text-sm">
              <span class="w-5 text-center shrink-0">📅</span>
              <div>
                <span class="block text-zinc-500 text-xs uppercase">Data Agendada</span>
                <span class="text-zinc-300 font-medium">${dataFormatada}</span>
              </div>
            </div>
            <div class="flex gap-3 text-sm">
              <span class="w-5 text-center shrink-0">📍</span>
              <div>
                <span class="block text-zinc-500 text-xs uppercase">Endereço</span>
                <span class="text-zinc-300 font-medium line-clamp-2" title="${pedido.endereco}">${pedido.endereco}</span>
              </div>
            </div>
          </div>
          
          <div class="pt-4 border-t border-zinc-800 flex justify-between items-center text-xs text-zinc-500">
            <span>Solicitado em: ${dataCriadaFormatada}</span>
          </div>
        `;
        list.appendChild(card);
      });
    }
  </script>
</body>
</html>

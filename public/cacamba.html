<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Caçamba</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body class="bg-white min-h-screen">
    <div class="max-w-md mx-auto px-4 py-16">
      <div class="mb-10">
        <a href="index.html" class="text-sm text-gray-600 hover:text-gray-900"
          >Voltar</a
        >
        <h1 class="text-2xl font-normal text-gray-900 mt-10 mb-1">
          Nova Caçamba
        </h1>
        <p class="text-sm text-gray-500">Registre uma nova caçamba</p>
      </div>

      <div id="alert" class="mb-6 p-4 rounded text-sm hidden"></div>

      <form id="form" class="space-y-5">
        <div>
          <label class="block text-sm font-normal text-gray-700 mb-2"
            >Tamanho</label
          >
          <select
            name="tamanho"
            required
            class="w-full px-3 py-2 border border-gray-200 rounded bg-white text-sm focus:outline-none focus:border-gray-400"
          >
            <option value="">Selecione</option>
            <option value="GRANDE">Grande</option>
            <option value="MEDIO">Médio</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-normal text-gray-700 mb-2"
            >Status</label
          >
          <select
            name="status"
            class="w-full px-3 py-2 border border-gray-200 rounded bg-white text-sm focus:outline-none focus:border-gray-400"
          >
            <option value="DISPONIVEL">Disponível</option>
            <option value="ENTREGUE">Entregue</option>
            <option value="EM_MANUTENCAO">Em Manutenção</option>
            <option value="RESERVADA">Reservada</option>
          </select>
        </div>

        <button
          type="submit"
          class="w-full py-2.5 bg-gray-900 text-white text-sm font-normal rounded hover:bg-gray-800 transition mt-8"
        >
          Cadastrar
        </button>
      </form>
    </div>

    <script>
      const form = document.querySelector("#form");
      const alert = document.querySelector("#alert");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const tamanho = form.querySelector('[name="tamanho"]').value;
        const status = form.querySelector('[name="status"]').value;

        try {
          const res = await fetch("/api/cacambas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tamanho, status }),
          });
          const data = await res.json();

          if (res.ok) {
            alert.textContent = "✓ " + data.mensagem;
            alert.className =
              "mb-6 p-4 rounded text-sm bg-green-50 text-green-700";
            form.reset();
          } else {
            alert.textContent = "✗ " + data.erro;
            alert.className = "mb-6 p-4 rounded text-sm bg-red-50 text-red-700";
          }
        } catch (e) {
          alert.textContent = "✗ Erro ao conectar";
          alert.className = "mb-6 p-4 rounded text-sm bg-red-50 text-red-700";
        }
      });
    </script>
  </body>
</html>

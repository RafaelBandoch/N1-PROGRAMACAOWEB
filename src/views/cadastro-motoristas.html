<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Motoristas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
      }

      .header h1 {
        color: #333;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95em;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .btn-back {
        background: #e0e7ff;
        color: #667eea;
      }

      .btn-back:hover {
        background: #667eea;
        color: white;
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .form-section {
        background: white;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .form-section h2 {
        color: #333;
        margin-bottom: 20px;
        border-bottom: 3px solid #667eea;
        padding-bottom: 10px;
      }

      .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .form-group label {
        font-weight: 600;
        color: #666;
      }

      .form-group input,
      .form-group select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 0.95em;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
      }

      .table-section {
        background: white;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .table-section h2 {
        color: #333;
        margin-bottom: 20px;
        border-bottom: 3px solid #667eea;
        padding-bottom: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }

      table thead {
        background: #f8f9fa;
      }

      table th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #666;
        border-bottom: 2px solid #ddd;
      }

      table td {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
      }

      table tbody tr:hover {
        background: #f8f9fa;
      }

      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        font-weight: 600;
        background: #d4edda;
        color: #155724;
      }

      .badge-inactive {
        background: #f8d7da;
        color: #721c24;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .actions .btn {
        padding: 6px 12px;
        font-size: 0.85em;
      }

      .btn-success {
        background: #28a745;
        color: white;
      }

      .btn-success:hover {
        background: #218838;
      }

      .btn-danger {
        background: #dc3545;
        color: white;
      }

      .btn-danger:hover {
        background: #c82333;
      }

      .btn-secondary {
        background: #6c757d;
        color: white;
      }

      .btn-secondary:hover {
        background: #5a6268;
      }

      .alert {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      @media (max-width: 968px) {
        .content {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .form-actions {
          flex-direction: column;
        }

        .form-actions .btn {
          width: 100%;
        }

        table {
          font-size: 0.9em;
        }

        table th,
        table td {
          padding: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>👨‍🚗 Cadastro de Motoristas</h1>
        <a href="/" class="btn btn-back">← Voltar</a>
      </div>

      <!-- Content -->
      <div class="content">
        <!-- Formulário -->
        <div class="form-section">
          <h2>➕ Novo Motorista</h2>

          <div id="alert" class="alert"></div>

          <form onsubmit="criarMotorista(event)" id="formMotorista">
            <div class="form-group">
              <label for="nome">Nome *</label>
              <input
                type="text"
                id="nome"
                name="nome"
                required
                placeholder="Ex: Carlos Silva"
              />
            </div>

            <div class="form-group">
              <label for="status">Status *</label>
              <select id="status" name="status" required>
                <option value="ATIVO">Ativo</option>
                <option value="INATIVO">Inativo</option>
              </select>
            </div>

            <div class="form-actions">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="document.getElementById('formMotorista').reset()"
              >
                Limpar
              </button>
              <button type="submit" class="btn btn-primary">
                Cadastrar Motorista
              </button>
            </div>
          </form>
        </div>

        <!-- Lista de Motoristas -->
        <div class="table-section">
          <h2>📋 Motoristas Cadastrados</h2>
          <table id="tabelaMotoristas">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Status</th>
                <th>Criado em</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpoMotoristas"></tbody>
          </table>
          <div id="emptyMotoristas" class="empty-state" style="display: none">
            <p>Nenhum motorista cadastrado</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let motoristas = [];

      carregarMotoristas();

      async function criarMotorista(event) {
        event.preventDefault();

        const dados = {
          nome: document.getElementById("nome").value,
          status: document.getElementById("status").value,
        };

        try {
          const response = await fetch("/api/motoristas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados),
          });

          const alert = document.getElementById("alert");

          if (response.ok) {
            alert.textContent = "✅ Motorista cadastrado com sucesso!";
            alert.className = "alert alert-success";
            document.getElementById("formMotorista").reset();
            carregarMotoristas();
          } else {
            alert.textContent = "❌ Erro ao cadastrar motorista!";
            alert.className = "alert alert-error";
          }
        } catch (error) {
          console.error("Erro:", error);
          const alert = document.getElementById("alert");
          alert.textContent = "❌ Erro ao cadastrar motorista!";
          alert.className = "alert alert-error";
        }
      }

      async function carregarMotoristas() {
        try {
          const response = await fetch("/api/motoristas");
          motoristas = await response.json();
          exibirMotoristas();
        } catch (error) {
          console.error("Erro ao carregar motoristas:", error);
        }
      }

      function exibirMotoristas() {
        const corpo = document.getElementById("corpoMotoristas");
        const emptyState = document.getElementById("emptyMotoristas");
        const tabela = document.getElementById("tabelaMotoristas");

        if (motoristas.length === 0) {
          tabela.style.display = "none";
          emptyState.style.display = "block";
          return;
        }

        tabela.style.display = "table";
        emptyState.style.display = "none";

        corpo.innerHTML = motoristas
          .map((motorista) => {
            const badgeClass =
              motorista.status === "ATIVO" ? "" : "badge-inactive";
            return `
                    <tr>
                        <td>#${motorista.id}</td>
                        <td>${motorista.nome}</td>
                        <td><span class="badge ${badgeClass}">${motorista.status}</span></td>
                        <td>${new Date(motorista.created_at).toLocaleString("pt-BR")}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-primary" onclick="editarMotorista(${motorista.id})">✏️ Editar</button>
                                <button class="btn btn-danger" onclick="deletarMotorista(${motorista.id})">🗑️ Deletar</button>
                            </div>
                        </td>
                    </tr>
                `;
          })
          .join("");
      }

      async function editarMotorista(id) {
        const motorista = motoristas.find((m) => m.id === id);
        if (!motorista) return;

        const nome = prompt("Nome:", motorista.nome);
        if (nome === null) return;

        const status = prompt("Status (ATIVO/INATIVO):", motorista.status);
        if (status === null) return;

        try {
          const response = await fetch(`/api/motoristas/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome, status }),
          });

          if (response.ok) {
            alert("✅ Motorista atualizado!");
            carregarMotoristas();
          } else {
            alert("❌ Erro ao atualizar!");
          }
        } catch (error) {
          console.error("Erro:", error);
          alert("❌ Erro ao atualizar!");
        }
      }

      async function deletarMotorista(id) {
        if (!confirm("Tem certeza que deseja deletar este motorista?")) return;

        try {
          const response = await fetch(`/api/motoristas/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("✅ Motorista deletado!");
            carregarMotoristas();
          } else {
            alert("❌ Erro ao deletar!");
          }
        } catch (error) {
          console.error("Erro:", error);
          alert("❌ Erro ao deletar!");
        }
      }
    </script>
  </body>
</html>

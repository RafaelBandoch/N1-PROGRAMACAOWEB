<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Facilita Caçambas</title>
  <link rel="stylesheet" href="../css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen relative flex items-center justify-center selection:bg-teal-100 selection:text-teal-900 py-12 overflow-y-auto">

  <!-- Background Blur Orbs -->
  <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] opacity-30 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-r from-teal-200 to-emerald-100 blur-[150px] rounded-full"></div>
  </div>

  <div class="relative z-10 w-full max-w-xl p-8">
    <div class="text-center mb-8">
      <a href="../landing.html" class="inline-flex items-center gap-3 mb-6 hover:scale-105 transition-transform">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-teal-600 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-teal-500/20">
          C
        </div>
        <span class="text-2xl font-bold tracking-tight text-slate-800">Caçambas<span class="text-teal-600">PRO</span></span>
      </a>
      <h1 class="text-3xl font-bold text-slate-800 mb-2">Crie sua conta</h1>
      <p class="text-slate-500">Cadastre-se para começar a alugar caçambas com facilidade.</p>
    </div>

    <div class="bg-white/80 backdrop-blur-md border border-slate-200 rounded-3xl p-8 shadow-xl">
      <form id="cadastroForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Nome Completo</label>
          <input type="text" id="nome" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="João da Silva">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-2">E-mail</label>
            <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="joao@email.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-2">Senha</label>
            <input type="password" id="senha" required minlength="6" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="••••••••">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">CPF ou CNPJ</label>
          <input type="text" id="cpf_cnpj" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="000.000.000-00">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Endereço de Faturamento</label>
          <input type="text" id="endereco" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-colors placeholder-slate-400" placeholder="Rua Exemplo, 123, Bairro - Cidade/UF">
        </div>
        
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg text-center"></div>
        <div id="successMessage" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-600 text-sm p-3 rounded-lg text-center"></div>

        <button type="submit" class="w-full py-4 rounded-xl bg-teal-600 hover:bg-teal-700 text-white font-bold text-lg transition-all shadow-md shadow-teal-600/20 flex items-center justify-center mt-4">
          Cadastrar Conta
        </button>
      </form>
      
      <p class="text-center mt-6 text-slate-500 text-sm">
        Já possui conta? <a href="login.html" class="text-teal-600 hover:text-teal-700 font-medium">Faça login</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const cpf_cnpj = document.getElementById('cpf_cnpj').value;
      const endereco = document.getElementById('endereco').value;
      
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');
      
      try {
        const response = await fetch('/api/auth/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome, email, senha, cpf_cnpj, endereco, role: 'cliente'
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successDiv.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
          successDiv.classList.remove('hidden');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          errorDiv.textContent = data.error || 'Erro ao cadastrar';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | CaçambasPRO</title>
    <link rel="stylesheet" href="../css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Customize scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <script>
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      
      if (!token || !userStr) {
        window.location.href = 'login.html';
      } else {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
          window.location.href = 'login.html';
        }
      }
    </script>
</head>
<body class="bg-slate-50 text-slate-700 h-screen overflow-hidden flex font-sans">

<!-- Sidebar -->
<aside class="w-64 bg-slate-900 flex flex-col shadow-2xl z-20 flex-shrink-0 text-slate-300">
  <div class="h-20 flex items-center px-6 border-b border-slate-800">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-teal-400 flex items-center justify-center text-white font-extrabold text-sm shadow-md shadow-teal-500/20 mr-3">
      C
    </div>
    <span class="text-xl font-bold tracking-tight text-white">Caçambas<span class="text-teal-400">PRO</span></span>
  </div>
  
  <div class="flex-1 py-6 px-4 overflow-y-auto flex flex-col gap-2">
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mb-2">Painel Inicial</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="dashboard">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      </span>
      Visão Geral
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="solicitacoes">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      </span>
      Solicitações
    </button>
    
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Gestão Estratégica</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="usuarios">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      </span>
      Usuários
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="clientes">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
      </span>
      Clientes
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="motoristas">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      </span>
      Motoristas
    </button>
    
    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Operacional</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="veiculos">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0zM13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1a2 2 0 002-2V9a1 1 0 00-1-1h-2m2 4h3m0 0l-2-3m2 3l-2 3"></path></svg>
      </span>
      Veículos
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="cacambas">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      </span>
      Caçambas
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="rotas">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
      </span>
      Rotas
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="tarefas">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
      </span>
      Tarefas
    </button>

    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Financeiro</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="relatorio-financeiro">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </span>
      Relatório Financeiro
    </button>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="clientes-gasto">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138z"></path></svg>
      </span>
      Clientes Top
    </button>

    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mt-4 mb-2">Segurança</span>
    <button class="tipo-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl font-semibold transition-all duration-300 group" data-tipo="logs">
      <span class="w-5 flex items-center justify-center opacity-70 group-hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      </span>
      Logs de Acesso
    </button>
  </div>
  
  <div class="p-4 border-t border-slate-800">
    <div class="bg-slate-800 rounded-xl p-4 flex flex-col gap-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-slate-300 font-bold">A</div>
        <div class="overflow-hidden">
          <p class="text-sm font-bold text-white truncate">Administrador</p>
          <p id="userEmailDisplay" class="text-xs text-slate-400 truncate">admin@...</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 py-2 rounded-lg text-sm font-bold transition-colors">
        Sair do Sistema
      </button>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
  <!-- Background blur fixo no fundo da area principal -->
  <div class="absolute top-0 right-0 w-[800px] h-[500px] opacity-20 pointer-events-none z-0">
    <div class="absolute inset-0 bg-gradient-to-r from-teal-200 to-emerald-100 blur-[120px] rounded-full"></div>
  </div>

  <header class="h-20 border-b border-slate-200 bg-white/50 backdrop-blur-md z-10 flex-shrink-0 flex items-center">
    <div class="w-full max-w-[1600px] mx-auto flex items-center justify-between px-8">
      <div>
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Painel Central</span>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight leading-none" id="titulo-lista">Dashboard</h1>
      </div>
      <button id="btn-cadastrar" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-transform active:scale-95 shadow-md shadow-teal-600/20 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/></svg>
        Novo Registro
      </button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-8 z-10 w-full max-w-[1600px] mx-auto">
    <div id="lista-conteudo" class="w-full min-h-[400px]">
        <!-- Renderizado pelo JS -->
    </div>
  </div>
</main>

<div id="modal-container"></div>

<!-- Modal do Mapa (Google Maps Mock) -->
<div id="mapModal" class="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm hidden flex-col items-center justify-center p-6">
  <div class="bg-white border border-slate-200 rounded-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden shadow-2xl relative">
    <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-white z-10">
      <h2 class="text-xl font-bold text-slate-800">Trajeto Otimizado</h2>
      <button onclick="closeMapModal()" class="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg p-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div id="map" class="flex-1 w-full bg-slate-100"></div>
  </div>
</div>

<script>
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.email) {
      document.getElementById('userEmailDisplay').textContent = user.email;
    }
  });
</script>
<script src="../js/admin.js"></script>
<script src="../js/notificacoes.js"></script>
</body>
</html>

<div class="p-6">
  <div class="mb-6">
    <h2 class="text-xl font-bold text-slate-800">Aprovar Solicitação</h2>
    <p class="text-sm text-slate-500 mt-1">Preencha os dados operacionais necessários para converter esta solicitação em uma tarefa oficial.</p>
  </div>

  <form id="modal-form" class="space-y-4">
    <input type="hidden" name="solicitacao_id" id="aprovar-solicitacao-id">

    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">Caçamba Disponível</label>
      <select name="cacamba_id" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 transition outline-none select-cacambas text-sm">
        <option value="" disabled selected>Carregando caçambas...</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">Motorista</label>
      <select name="motorista_id" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 transition outline-none select-motoristas text-sm">
        <option value="" disabled selected>Carregando motoristas...</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-600 mb-1">Veículo</label>
      <select name="veiculo_id" required class="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 transition outline-none select-veiculos text-sm">
        <option value="" disabled selected>Carregando veículos...</option>
      </select>
    </div>

    <div id="modal-alerta" class="pt-2"></div>

    <div class="flex gap-3 pt-4 border-t border-slate-200 mt-6">
      <button type="button" id="btn-cancelar-modal" class="flex-1 py-2.5 px-4 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium transition text-sm">Cancelar</button>
      <button type="submit" class="flex-1 py-2.5 px-4 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-bold transition text-sm flex items-center justify-center shadow-md shadow-emerald-600/20">Aprovar e Criar Tarefa</button>
    </div>
  </form>
</div>

<div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0 flex items-center justify-center z-50 p-4">
  <div class="bg-white border border-slate-200 rounded-3xl w-full max-w-md p-8 shadow-2xl transform scale-95 opacity-0 transition-all duration-300 max-h-[90vh] overflow-y-auto w-full">
    <div class="flex justify-between items-center mb-8">
      <h2 id="modal-titulo" class="text-2xl font-bold text-slate-800">Cadastrar Veículo</h2>
      <button id="btn-fechar-modal" class="text-slate-400 hover:text-slate-700 p-2">✕</button>
    </div>

    <div id="modal-alerta" class="mb-6"></div>
    <form id="modal-form" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase ml-1 mb-1">Placa</label>
        <input type="text" name="placa" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 transition-all" required />
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase ml-1 mb-1">Capacidade (m³)</label>
        <input type="number" name="capacidade" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500 transition-all" required />
      </div>

      <div class="flex gap-3 pt-6">
        <button type="submit" id="btn-salvar-modal" class="flex-1 bg-teal-600 text-white font-bold py-3 rounded-xl hover:bg-teal-700 transition-colors shadow-md shadow-teal-600/20">Salvar</button>
        <button type="button" id="btn-cancelar-modal" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
      </div>
    </form>
  </div>
</div>

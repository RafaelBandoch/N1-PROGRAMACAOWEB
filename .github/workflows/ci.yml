name: CI

on:
  push:
    branches:
      - main
      - ci-cd
      - Teste
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Rodar build se existir
        run: npm run build --if-present

      - name: Rodar testes unitários
        run: npm test